<div class="container my-5">

              <button class="nav-link active py-3 fw-bold" id="reservation-tab" data-bs-toggle="tab" data-bs-target="#reservation" type="button">

        <div class="card-body p-4 p-md-5">
          <div class="tab-content" id="orderTabContent">
            
            <!-- FORM 1: RESERVASI MEJA -->
            <div class="tab-pane fade show active" id="reservation" role="tabpanel">
              <h3 class="mb-4 fw-bold">Booking Meja</h3>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">Nama Lengkap</label>
                    <input type="text" class="form-control" placeholder="Contoh: Budi Santoso" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">Alamat Email</label>
                    <input type="email" class="form-control" placeholder="budi@email.com">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">No. Telepon (WhatsApp)</label>
                    <input type="tel" class="form-control" placeholder="0812..." required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">Jumlah Orang</label>
                    <input type="number" class="form-control" min="1" placeholder="Berapa orang?">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">Tanggal</label>
                    <input type="date" class="form-control">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label small fw-bold">Jam</label>
                    <input type="time" class="form-control">
                  </div>
                  <div class="col-12 mt-4">
                    <button class="btn btn-dark w-100 py-2 fw-bold text-light">Konfirmasi Reservasi</button>
                  </div>
                </div>
              </form>
            </div>

            <!-- FORM 2: ONLINE ORDER -->
            <div class="tab-pane fade" id="order" role="tabpanel">
              <h3 class="mb-4 fw-bold">Pesan Makanan & Minuman</h3>
              <form>
                <div class="row g-3">
                  <div class="col-md-12">
                    <label class="form-label small fw-bold">Pilih Menu (Tuliskan Pesanan)</label>
                    <textarea class="form-control" rows="3" placeholder="Contoh: 2 Nasi Goreng, 1 Es Teh Manis"></textarea>
                  </div>
                  <div class="col-md-12 mt-3">
                    <label class="form-label small fw-bold">Metode Pengambilan</label>
                    <div class="d-flex gap-3">
                      <div class="form-check">
                        <input class="form-check-input" type="radio" name="method" id="delivery" checked>
                        <label class="form-check-label" for="delivery">Delivery</label>
                      </div>
                      <div class="form-check">
                        <input class="form-check-input" type="radio" name="method" id="pickup">
                        <label class="form-check-label" for="pickup">Ambil di Resto</label>
                      </div>
                    </div>
                  </div>
                
                  <div class="col-12">
                    <label class="form-label small fw-bold">Alamat Pengiriman (Jika Delivery)</label>
                    <input type="text" class="form-control" placeholder="Nama Jalan, Blok, No Rumah">
                  </div>
                  <div class="col-12 mt-4">
                    <button class="btn btn-dark w-100 py-2 fw-bold text-light">Pesan Sekarang</button>
                  </div>
                </div>
              </form>
            </div>

          </div>
        </div>
      </div>
    </div>
